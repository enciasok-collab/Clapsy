<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Beautiful premium gold gradient matching Clapsy Sleep brand identity -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5AB" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
  </defs>
  
  <!-- Symmetric Triquetra (Celtic Trinity Knot) with premium thick stroke for visibility in browser tabs -->
  <g transform="translate(0, 2)">
    <path d="M50 15 C34 35 34 58 50 78 C66 58 66 35 50 15 Z" transform="rotate(0, 50, 50)" fill="none" stroke="url(#gold-grad)" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M50 15 C34 35 34 58 50 78 C66 58 66 35 50 15 Z" transform="rotate(120, 50, 50)" fill="none" stroke="url(#gold-grad)" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M50 15 C34 35 34 58 50 78 C66 58 66 35 50 15 Z" transform="rotate(240, 50, 50)" fill="none" stroke="url(#gold-grad)" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
